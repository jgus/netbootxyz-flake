name: Update netboot.xyz

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(grep 'version = ' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          latest=$(gh api repos/netbootxyz/netboot.xyz/releases/latest --jq '.tag_name')
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and hashes
        if: steps.check.outputs.update == 'true'
        run: |
          version="${{ steps.check.outputs.latest }}"

          # Download checksums file
          curl -sL "https://github.com/netbootxyz/netboot.xyz/releases/download/${version}/netboot.xyz-sha256-checksums.txt" \
            > checksums.txt

          # Build new assets block from checksums
          {
            echo "      assets = {"
            while IFS=" *" read -r hex name; do
              [[ "$hex" == "#"* || -z "$hex" ]] && continue
              sri=$(nix hash convert --to sri --hash-algo sha256 "$hex")
              printf '        "%s" = "%s";\n' "$name" "$sri"
            done < checksums.txt
            echo "      };"
          } > assets_block.txt

          # Update version
          sed -i "s/version = \".*\"/version = \"${version}\"/" flake.nix

          # Replace assets block
          sed -i '/^      assets = {/,/^      };/{
            /^      assets = {/{
              r assets_block.txt
              d
            }
            d
          }' flake.nix

          rm checksums.txt assets_block.txt

      - name: Update flake lock
        if: steps.check.outputs.update == 'true'
        run: nix flake update

      - name: Commit and tag
        if: steps.check.outputs.update == 'true'
        run: |
          version="${{ steps.check.outputs.latest }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "Update netboot.xyz to v${version}"
          git tag "v${version}"
          git push
          git push --tags
